# Render Blueprint: static site deploy
# Ensures publish directory is dist so /assets/* (CSS, JS) are served correctly
services:
  - type: web
    name: rangelands
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /assets/*.js
        name: Content-Type
        value: application/javascript; charset=utf-8
      - path: /assets/*.css
        name: Content-Type
        value: text/css; charset=utf-8
    routes:
      # SPA: serve index.html for client-side routes (Render serves real files first, so /assets/* still work)
      - type: rewrite
        source: /*
        destination: /index.html
