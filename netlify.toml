[build]
  command = "npm run build"
  publish = "dist"

# Ensure JavaScript modules are served with correct MIME type (fixes the octet-stream error)
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
